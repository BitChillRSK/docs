# Service/container name must not match public hostname (docs.bitchill.app), so internal
# DNS doesn't resolve it to this container; Uptime Kuma and clients then hit Traefik on 443.
services:
  docs-app:
    container_name: docs-app
    image: bitchill-docs:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    labels:
      - "bitchill.autoheal=true"
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=Host(`docs.bitchill.app`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.routers.docs.tls.certresolver=le"
      - "traefik.http.services.docs.loadbalancer.server.port=8080"
    networks:
      bitchill-network:
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL

networks:
  bitchill-network:
    external: true
